<!doctype html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="css/global.css" />
        <link rel="stylesheet" href="css/pages/add-post.css" />

        <meta name="description" value="" />
        <meta name="author" value="0x5448594f" />
        <meta name="robots" value="noindex" />
        <title>Add_Post::Thyo's Journey</title>
    </head>

    <body>
        <header>
            <a href="/"><h1>Thyo's Journey</h1></a>

            <nav>
                <ul>
                    <li><a href="/about"><code>/about</code></a></li>
                    <li><a><code>/posts</code></a></li>
                    <li><a><code>/contact</code></a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="error-container"></section>

            <form id="post-informations">
                <label name="title">
                    <textarea id="title-textarea" placeholder="Enter the title of the post..."></textarea>
                </label>

                <label name="description">
                    <textarea id="description-textarea" placeholder="Enter the description of the post..."></textarea>
                </label>


                <label name="tags">
                    <input id="tags-input" placeholder="tags/other tag"/>
                </label>
            </form>

            <section class="buttons-container">
                <div class="image-input-container">
                    <input type="file" id="add-image" /> <button>Ajouter une image</button>
                </div>
            </section>

            <textarea id="input" autofocus></textarea>
            <span class="hide" style="white-space: pre-line" id="preview-container"></span>

            <button id="preview" data-value="to-html">Preview HTML</button>
            <button id="send">Save</button>

            <script type="module" src="src/add-post-page.js"></script>
        </main>
    </body>
</html>
